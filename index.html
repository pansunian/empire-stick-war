<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#121616" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="帝国火柴人战争" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="一款可安装到主屏幕的中世纪火柴人帝国战争网页游戏。" />
    <title>帝国火柴人战争</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/icon.svg" />
    <link rel="stylesheet" href="./style.css?v=20260529-mobile-ui-v3" />
  </head>
  <body>
    <section id="factionSelect" class="faction-select" aria-label="选择阵营">
      <div class="faction-panel">
        <p class="kicker">选择模式与帝国</p>
        <h1>中世纪帝国战争</h1>
        <div class="mode-options" aria-label="选择游戏模式">
          <button class="mode-card active" data-mode="versus">
            <strong>对战模式</strong>
            <small>人机对战，正常开局金币</small>
          </button>
          <button class="mode-card" data-mode="brawl">
            <strong>大乱斗模式</strong>
            <small>人机对战，双方开局 5000 金币</small>
          </button>
          <button class="mode-card" data-mode="campaign">
            <strong>战役模式</strong>
            <small>选择阵营，进入 15 关战役地图</small>
          </button>
        </div>
        <div class="faction-options three">
          <button class="faction-card order" data-faction="order">
            <span class="crest"></span>
            <strong>秩序帝国</strong>
            <small>矿工、剑士、长矛兵、弓箭手、大剑兵、斯巴达、修道士、弩手、火枪手、法师、奴役巨人</small>
          </button>
          <button class="faction-card chaos" data-faction="chaos">
            <span class="crest"></span>
            <strong>混沌帝国</strong>
            <small>矿工、爬行者、亡灵、砍刀兵、死尸、毒尸、炸弹客、恶魔弓手、黑骑士、亡灵法师、巨人</small>
          </button>
          <button class="faction-card element" data-faction="element">
            <span class="crest"></span>
            <strong>元素帝国</strong>
            <small>土元素、水元素、火元素、风元素、树精、罗格、厄火、飓风、烫水击、电门、V</small>
          </button>
        </div>
      </div>
    </section>

    <section id="campaignMap" class="campaign-map hidden" aria-label="战役地图">
      <div class="campaign-panel">
        <div class="campaign-head">
          <div>
            <p class="kicker">战役地图</p>
            <h2 id="campaignTitle">秩序帝国战役</h2>
            <small id="campaignProgress">第 1 关可挑战</small>
          </div>
          <button id="campaignBackBtn" class="icon-btn" title="返回主界面">×</button>
        </div>
        <div id="campaignPath" class="campaign-path"></div>
        <div id="campaignBriefing" class="campaign-briefing hidden" aria-label="关卡简介">
          <div class="campaign-briefing-card">
            <div class="campaign-briefing-head">
              <div>
                <p class="kicker">关卡简介</p>
                <h3 id="briefingTitle">第一关</h3>
                <small id="briefingReward">通关后解锁：无</small>
              </div>
              <button id="briefingCloseBtn" class="icon-btn" title="返回地图">×</button>
            </div>
            <div id="briefingContent" class="briefing-content"></div>
            <div class="briefing-actions">
              <button id="briefingStartBtn" class="briefing-start-btn">开始</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <main class="game-shell">
      <section class="top-bar">
        <div class="empire-card player">
          <span class="banner"></span>
          <div>
            <strong id="playerName">秩序帝国</strong>
            <small>金币 <span id="gold">120</span></small>
          </div>
        </div>

        <div class="status-panel">
          <span id="gameStatus">集结军队，摧毁敌方雕像</span>
          <button id="topHomeBtn" class="top-home-btn" title="回到主界面">主界面</button>
          <button id="installBtn" class="install-btn hidden" title="安装到主屏幕">安装</button>
          <button id="fullscreenBtn" class="fullscreen-btn" title="进入全屏">全屏</button>
          <button id="pauseBtn" class="pause-btn" title="暂停战斗">暂停</button>
          <button id="statsBtn" class="stats-btn" title="查看单位数值">数值</button>
          <button id="restartBtn" class="icon-btn" title="重新开始">↻</button>
        </div>

        <div class="empire-card enemy">
          <div>
            <strong id="enemyName">混沌帝国</strong>
            <small>金币 <span id="enemyGold">120</span></small>
          </div>
          <span class="banner"></span>
        </div>
      </section>

      <section class="battlefield-wrap">
        <canvas id="battlefield" width="3600" height="800" aria-label="中世纪帝国战场"></canvas>
        <div class="health-bars">
          <label>
            我方雕像
            <span class="bar"><span id="playerHpBar"></span></span>
          </label>
          <label>
            敌方雕像
            <span class="bar"><span id="enemyHpBar"></span></span>
          </label>
        </div>
        <button id="homeBtn" class="home-btn hidden" type="button">回到主界面</button>
      </section>

      <section class="control-deck">
        <div class="command-group" aria-label="军令">
          <button class="command-btn" data-command="retreat">
            <span>撤退</span>
            <small>回到城堡内</small>
          </button>
          <button class="command-btn active" data-command="guard">
            <span>防守</span>
            <small>逐级回防</small>
          </button>
          <button class="command-btn" data-command="attack">
            <span>进攻</span>
            <small>逐级推进</small>
          </button>
          <button class="command-btn miner-command-btn" data-miner-command="retreat">
            <span>矿工撤退</span>
            <small>矿工回城</small>
          </button>
          <button class="command-btn miner-command-btn active" data-miner-command="mine">
            <span>矿工挖矿</span>
            <small>恢复采集</small>
          </button>
          <button class="command-btn miner-command-btn" data-miner-command="attack">
            <span>矿工进攻</span>
            <small>停止采矿</small>
          </button>
        </div>

        <button id="mobileUnitsToggle" class="mobile-units-toggle" type="button" aria-expanded="false" aria-controls="unitShop">
          <span>兵种</span>
          <small>训练</small>
        </button>

        <div id="unitShop" class="unit-shop" aria-label="训练单位">
          <button class="train-btn" data-unit="miner">
            <span class="unit-icon miner"></span>
            <strong>矿工</strong>
            <small>50 金币</small>
          </button>
          <button class="train-btn" data-unit="swordsman">
            <span class="unit-icon sword"></span>
            <strong>剑士</strong>
            <small>80 金币</small>
          </button>
          <button class="train-btn" data-unit="archer">
            <span class="unit-icon bow"></span>
            <strong>弓箭手</strong>
            <small>100 金币</small>
          </button>
          <button class="train-btn" data-unit="greatsword">
            <span class="unit-icon greatsword"></span>
            <strong>大剑兵</strong>
            <small>140 金币</small>
          </button>
          <button class="train-btn" data-unit="monk">
            <span class="unit-icon monk"></span>
            <strong>修道士</strong>
            <small>120 金币</small>
          </button>
          <button class="train-btn" data-unit="crossbow">
            <span class="unit-icon crossbow"></span>
            <strong>弩手</strong>
            <small>130 金币</small>
          </button>
        </div>
      </section>
    </main>

    <section id="statsOverlay" class="stats-overlay hidden" aria-label="单位数值">
      <div class="stats-panel">
        <div class="stats-head">
          <div>
            <p class="kicker">单位图鉴</p>
            <h2>所有单位数值</h2>
          </div>
          <button id="closeStatsBtn" class="icon-btn" title="关闭">×</button>
        </div>
        <div id="statsTable" class="stats-table"></div>
      </div>
    </section>

    <section id="installGuide" class="install-guide hidden" aria-label="安装说明">
      <div class="install-panel">
        <p class="kicker">安装到主屏幕</p>
        <h2>像 App 一样启动游戏</h2>
        <p id="installGuideText">用浏览器菜单选择“添加到主屏幕”，下次就能从桌面图标直接进入。</p>
        <button id="closeInstallGuideBtn" class="install-close-btn">知道了</button>
      </div>
    </section>

    <section class="rotate-notice" aria-label="横屏提示">
      <div>
        <strong>请横屏游玩</strong>
        <span>横屏后战场、按钮和单位比例会更舒服。</span>
      </div>
    </section>

    <script src="./game.js?v=20260530-force-tower-rally-inside"></script>
  </body>
</html>
